<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada · Obrador Web</title>
  <meta name="robots" content="noindex,follow">
  <meta name="description" content="La página que buscas no existe o ha sido movida. Vuelve al inicio de Obrador Web.">
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Outfit:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Outfit:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Outfit:wght@400;500;600;700&display=swap"></noscript>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    a, a:visited, a:active { color: inherit; text-decoration: none; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1A1715;
      color: #F5EDE4;
      font-family: 'Outfit', sans-serif;
    }

    /* Navbar */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(245, 237, 228, 0.08);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    .nav-logo-text {
      font-family: 'Libre Caslon Display', serif;
      font-size: 22px;
    }
    .accent { color: #C4956A; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links a {
      font-size: 15px;
      font-weight: 500;
      color: rgba(245, 237, 228, 0.5);
      transition: color 0.3s;
    }
    .nav-links a:hover { color: #F5EDE4; }
    .nav-cta {
      background: #F5EDE4 !important;
      color: #1A1715 !important;
      padding: 10px 24px;
      border-radius: 100px;
      font-size: 14px;
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: 'Libre Caslon Display', serif;
      font-size: clamp(100px, 18vw, 180px);
      line-height: 1;
      color: #C4956A;
      opacity: 0.7;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #F5EDE4;
    }
    p {
      font-size: 16px;
      color: rgba(245, 237, 228, 0.45);
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      padding: 13px 32px;
      background: rgba(245, 237, 228, 0.1);
      color: #F5EDE4;
      border: 1px solid rgba(245, 237, 228, 0.15);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.3s, transform 0.3s;
    }
    .btn:hover {
      background: rgba(245, 237, 228, 0.15);
      transform: translateY(-2px);
    }

    /* Footer */
    .footer {
      padding: 32px 40px;
      border-top: 1px solid rgba(245, 237, 228, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-brand .nav-logo-text { font-size: 18px; }
    .footer-brand p {
      font-family: 'Libre Caslon Display', serif;
      font-size: 13px;
      color: rgba(245, 237, 228, 0.3);
      margin: 4px 0 0;
    }
    .footer-right {
      font-size: 13px;
      color: rgba(245, 237, 228, 0.3);
    }

    @media (max-width: 768px) {
      .navbar { padding: 16px 20px; }
      .nav-links { display: none; }
      .footer { flex-direction: column; gap: 12px; text-align: center; padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/logo.png" alt="Obrador">
      <span class="nav-logo-text">obrador<span class="accent">.web</span></span>
    </a>
    <div class="nav-links">
      <a href="/#portfolio">Proyectos</a>
      <a href="/#proceso">Proceso</a>
      <a href="/#planes">Planes</a>
      <a href="/#contacto" class="nav-cta">Hablemos</a>
    </div>
  </nav>

  <div class="content">
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>Lo sentimos, la página que buscas no existe o ha sido movida.</p>
    <a href="/" class="btn">Volver al inicio</a>
  </div>

  <footer class="footer">
    <div class="footer-brand">
      <span class="nav-logo-text">obrador<span class="accent">.web</span></span>
      <p>Webs para cafeterias en Madrid</p>
    </div>
    <div class="footer-right">&copy; 2026 Obrador Web · Madrid</div>
  </footer>

</body>
</html>
