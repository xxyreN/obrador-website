<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Obrador Web</title>
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A1715;
      color: #F5EDE4;
      font-family: 'Outfit', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: absolute;
      top: 32px;
      left: 32px;
    }
    .logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    .logo span {
      font-family: 'Libre Caslon Display', serif;
      font-size: 22px;
      color: #F5EDE4;
    }
    .logo .accent { color: #C4956A; }
    .code {
      font-family: 'Libre Caslon Display', serif;
      font-size: clamp(120px, 20vw, 200px);
      line-height: 1;
      color: #C4956A;
      opacity: 0.8;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Libre Caslon Display', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: rgba(245, 237, 228, 0.5);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: #F5EDE4;
      color: #1A1715;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245, 237, 228, 0.1);
    }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <img src="/img/logo.png" alt="Obrador">
    <span>obrador<span class="accent">.web</span></span>
  </a>
  <div class="code">404</div>
  <h1>Pagina no encontrada</h1>
  <p>Lo sentimos, la pagina que buscas no existe o ha sido movida.</p>
  <a href="/" class="btn">Volver al inicio</a>
</body>
</html>
